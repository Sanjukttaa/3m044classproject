<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="head1">Heading 1</h1>
        h1 id="head2">Heading 2</h1>
        <h1 id="head3">Heading 3</h1>
        <button id="btn1">Change color</button>

    <script>
        let btn = document.getElementById("btn1");

        btn.addEventListener("click", function() {

            document.getElementById("head1").style.color = "red";
            document.getElementById("head2").style.color = "blue";
            document.getElementById("head3").style.color = "green";

        });


    </script>
</body>
</html>
