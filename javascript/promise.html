<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="step1">Order Placed</h1>
<button id="btn1">Start Delivery</button>

<script>

let step1 = document.getElementById("step1");
let button1 = document.getElementById("btn1");

button1.addEventListener("click", () => {

    delivery(step1,"Order Packed",2000)
    .then(() => delivery(step1,"Out for Delivery",3000))
    .then(() => delivery(step1,"Order Arriving",1000))
    .then(() => delivery(step1,"Order Delivered",2000))
    .catch((e) => console.log(e));

});

function delivery(element,status,time){

    return new Promise((resolve,reject)=>{

        if(element){
            setTimeout(()=>{
                element.innerHTML = status;
                resolve();
            },time);
        }
        else{
            reject(new Error("Element does not exist"));
        }

    });

}

</script>
