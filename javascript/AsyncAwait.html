<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="head1">Heading 1</h1>
    <h2 id="head2">Heading 2</h2>
    <h3 id="head3">Heading 3</h3>
    <button id="btn1">Change color</button>

    <script>
        let heading1 = document.getElementById("head1");
        let heading2 = document.getElementById("head2");
        let heading3 = document.getElementById("head3");

        let button1 = document.getElementById("btn1");

        button1.addEventListener("click",async ()=>{
            try{
                await changeColor(heading1,"yellow",2000);
                await changeColor(heading2,"red",2000);
                await changeColor(heading3,"green",2000);
            }
            catch(e){
            console.log(e);
                }
        })

        function changeColor(element, color, time) {
            return new Promise((resolve, reject) => {
                if (element) {
                    setTimeout(() => {
                        element.style.color = color;
                        resolve();
                    }, time);
                } else {
                    reject(new Error("Element doesn't exist"));
                }
            });
        }
    </script> 
</body>
</html>
