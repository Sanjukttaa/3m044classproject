<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let arr1=[1,2,3,4,5];
        let arr3=[7,8,9];
        let arr2=["a","b"];
        console.log(arr1);
        arr1.push(300);
        console.log(arr1);
        console.log(arr1.concat(arr2));
        //Every method: It checks if all elements in an array pass a given test.
        // It returns true if all the elements pass the test otherwise it will return false.
        console.log(arr1.every(n=>n%2==0));
        console.log(arr3.every(n=>n%2==0));
        console.log(arr1.filter(n=>n%2==0));
        console.log(arr1.find(n=>n%2==0));

        arr1.forEach(n=>{
            console.log(n*2);
        })
        console.log(arr1.map(n=>n*2));
        console.log(arr1.indexOf(3));

    </script>
</body>
</html>
